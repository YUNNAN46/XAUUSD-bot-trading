services:
  mt5-service:
    image: gmag11/metatrader5:latest
    environment:
      - MT5_LOGIN=${MT5_LOGIN}
      - MT5_PASSWORD=${MT5_PASSWORD}
      - MT5_SERVER=${MT5_SERVER}
      - MT5_RPYC_PORT=8001
    ports:
      - "8001:8001"
      - "3000:3000"
    volumes:
      - mt5-data:/root/.metatrader5
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  bot-service:
    build: ./bot
    depends_on:
      mt5-service:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./bot:/app
    restart: unless-stopped

volumes:
  mt5-data:
