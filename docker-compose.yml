services:
  mt5-service:
    build:
      context: .
      dockerfile: Dockerfile.mt5
    environment:
      - CUSTOM_USER=${MT5_VNC_USER:-admin}
      - PASSWORD=${MT5_VNC_PASSWORD:-admin123}
    ports:
      - "8001:8001"
      - "3000:3000"
    volumes:
      - mt5-data:/config
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s
    restart: unless-stopped

  bot-service:
    build: ./bot
    depends_on:
      mt5-service:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./bot:/app
    restart: unless-stopped

volumes:
  mt5-data:
